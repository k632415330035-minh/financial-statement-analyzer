<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="brand">
        <span class="brand-mark">QL</span>
        <div>
          <p class="eyebrow">Quản lý dân cư</p>
          <h1 id="login-title">Đăng nhập</h1>
        </div>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Mã số sinh viên</label>
          <input id="username" name="username" type="text" inputmode="numeric" autocomplete="username"
            placeholder="Nhập 10 số sinh viên" required />
          <small class="error"></small>
        </div>

        <div class="field">
          <label for="password">Mật khẩu</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password"
              placeholder="Nhập mật khẩu" required />
            <button class="toggle-password" type="button" aria-label="Hiện mật khẩu" title="Hiện mật khẩu">👁</button>
          </div>
          <small class="error"></small>
        </div>

        <button class="submit-button" type="submit">Đăng nhập</button>
      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>

</html>
