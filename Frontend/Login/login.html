<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Đăng nhập</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="container" id="container">
    <!-- Đăng ký -->
    <div class="form-container sign-up">
      <form id="form-register" novalidate>
        <h1>Tạo tài khoản</h1>

        <div class="field">
          <label for="cccd-register">Mã số CCCD</label>
          <input type="text" id="cccd-register" placeholder="Mã số CCCD" inputmode="numeric" autocomplete="username"
            required />
          <small class="error"></small>
        </div>

        <div class="field">
          <label for="register-password">Mật khẩu</label>
          <div class="password-container">
            <input type="password" id="register-password" placeholder="Mật khẩu" autocomplete="new-password" required />
            <button type="button" class="toggle-password" data-target="register-password" title="Hiện/ẩn mật khẩu"
              aria-label="Hiện/ẩn mật khẩu">
              👁
            </button>
          </div>
          <small class="error"></small>
        </div>

        <button type="submit">Đăng ký</button>
      </form>
    </div>

    <!-- Đăng nhập -->
    <div class="form-container sign-in">
      <form id="form-login" novalidate>
        <h1>Đăng nhập</h1>

        <div class="field">
          <label for="cccd-login">Mã số CCCD</label>
          <input type="text" id="cccd-login" placeholder="Mã số CCCD" inputmode="numeric" autocomplete="username"
            required />
          <small class="error"></small>
        </div>

        <div class="field">
          <label for="login-password">Mật khẩu</label>
          <div class="password-container">
            <input type="password" id="login-password" placeholder="Mật khẩu" autocomplete="current-password"
              required />
            <button type="button" class="toggle-password" data-target="login-password" title="Hiện/ẩn mật khẩu"
              aria-label="Hiện/ẩn mật khẩu">
              👁
            </button>
          </div>
          <small class="error"></small>
        </div>

        <a href="#">Quên mật khẩu?</a>
        <button type="submit">Đăng nhập</button>
      </form>
    </div>

    <!-- Panel hiệu ứng -->
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Xin chào bạn!</h1>
          <p>
            Đăng nhập để tra cứu<br />
            cập nhật thông tin cư trú.
          </p>
          <button class="hidden" id="login" type="button">Đăng nhập</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Xin chào bạn!</h1>
          <p>Đăng ký tài khoản để khai báo thông tin.</p>
          <button class="hidden" id="register" type="button">Đăng ký</button>
        </div>
      </div>
    </div>
  </div>
